<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Kareem Montaser | Portfolio</title>
    <script type="text/javascript">
      // 💡 السكريبت ده بياخد اللينك اللي عمل 404 وبيبعته كـ "Parameter" للصفحة الرئيسية
      var pathSegmentsToKeep = 1; // اسم الـ Repo بتاعك: My_Portfolio

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
